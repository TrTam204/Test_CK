<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Store - TTam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Demo Store</div>
    <div>
      <a href="index.html">Trang chủ</a>
      <a href="products.html">Sản phẩm</a>
      <a id="cart-link" href="cart.html" class="hidden">Giỏ hàng</a>
      <a id="login-link" href="login.html">Đăng nhập</a>
      <button id="logout-btn" class="logout-btn hidden" onclick="logout()">Đăng xuất</button>
    </div>
  </nav>

  <section class="banner">
    <h1>Web Demo by Truong Tam</h1>
    <p>Web được tạo để phục vụ chức năng kiểm thử CORS</p>
    <div class="search-container" style="margin-top: 20px; display: flex; justify-content: center;">
        <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm..." style="padding: 10px; width: 400px; border-radius: 5px; border: none;">
        <button onclick="searchProducts()" style="padding: 10px 15px; border-radius: 5px; border: none; background-color: #FF5733; color: white; cursor: pointer; margin-left: 10px;">Tìm kiếm</button>
    </div>
  </section>

  <section class="categories">
    <h2>Danh mục sản phẩm</h2>
    <div class="category-grid">
      <div class="category-card" onclick="filterByCategory('Cameras')">
        <div class="category-card-icon">📷</div>
        <div class="category-card-name">Cameras</div>
      </div>
      <div class="category-card" onclick="filterByCategory('Watches')">
        <div class="category-card-icon">⌚</div>
        <div class="category-card-name">Watches</div>
      </div>
      <div class="category-card" onclick="filterByCategory('Shirts')">
        <div class="category-card-icon">👕</div>
        <div class="category-card-name">Shirts</div>
      </div>
      <div class="category-card" onclick="loadProducts()">
        <div class="category-card-icon">🔄</div>
        <div class="category-card-name">Tất cả</div>
      </div>
    </div>
  </section>

  <section class="container" style="padding: 40px 20px;">
    <h2 id="products-heading" style="font-size: 28px; font-weight: 700; margin-bottom: 30px;">Tất cả sản phẩm</h2>
    <div id="products" class="grid"></div>
  </section>

  <script src="app.js"></script>
  <script>
    async function loadFeatured() {
      try {
        const data = await request("GET", "/api/products");
        if (data.error) return;
        const featured = document.getElementById("featured-grid");
        featured.innerHTML = data.slice(0, 4).map(p => `
          <div class="card">
            <div class="card-image">
              <img src="https://via.placeholder.com/250?text=${p.Name}" alt="${p.Name}">
            </div>
            <div class="card-body">
              <div class="card-name">${p.Name}</div>
              <div class="card-price">$${parseFloat(p.Price).toFixed(2)}</div>
              <button onclick="addToCart(${p.Id}, '${p.Name}', ${p.Price})">Thêm vào giỏ</button>
            </div>
          </div>
        `).join("");
      } catch (e) {
        console.log("Error loading featured products");
      }
    }
    window.addEventListener("load", () => {
      checkAuth();
      loadFeatured();
    });
  </script>
</body>
</html>
