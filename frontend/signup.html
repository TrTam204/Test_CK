<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Demo Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Demo Store</div>
    <div>
      <a href="index.html">Trang chủ</a>
      <a href="products.html">Sản phẩm</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-box">
      <h2>Tạo tài khoản</h2>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" placeholder="Enter your full name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Create a password">
      </div>
      <div class="form-group">
        <label for="contact">Contact</label>
        <input id="contact" type="text" placeholder="Enter your contact number">
      </div>
      <div class="form-group">
        <label for="city">City</label>
        <input id="city" type="text" placeholder="Enter your city">
      </div>
      <div class="form-group">
        <label for="address">Address</label>
        <input id="address" type="text" placeholder="Enter your address">
      </div>
      <button onclick="signup()">Sign Up</button>
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
